<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motorcycle Merge</title>

    <link rel="manifest" href="/motorcycle-merge/manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@700&family=Barlow+Condensed:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  /* Prevents scrolling/zooming on mobile */
  body, html { 
    background: #05050a; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    height: 100%; 
    width: 100%;
    font-family: 'Barlow Condensed', sans-serif; 
    overflow: hidden; 
    touch-action: none;
    position: fixed;
  }

  #gameWrapper { 
    position: relative; 
    width: 360px; 
    height: 580px; 
    border-radius: 12px; 
    overflow: hidden; 
    box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 0 2px #222; 
    max-width: 100vw;
    max-height: 100vh;
  }
  
  canvas { display: block; width: 100%; height: 100%; }
  #ui { position: absolute; top: 0; left: 0; right: 0; padding: 18px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
  #scoreLabel { font-size: 11px; color: #ffcc33; letter-spacing: 2px; text-transform: uppercase; }
  #score { font-family: 'Teko', sans-serif; font-size: 42px; color: #fff; line-height: 0.8; }
  #livesBox { display: flex; gap: 5px; }
  .life { font-size: 18px; transition: opacity 0.3s; }
  
  #settingsToggle { position: absolute; bottom: 20px; right: 20px; width: 45px; height: 45px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 24px; }
  #settingsMenu { position: absolute; bottom: 75px; right: 20px; width: 180px; background: rgba(20, 20, 35, 0.98); border: 1px solid #444; border-radius: 10px; padding: 15px; display: none; flex-direction: column; gap: 12px; z-index: 100; color: white; }
  .setting-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
  .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; inset: 0; background-color: #333; transition: .4s; border-radius: 20px; }
  .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: #ffcc33; }
  input:checked + .slider:before { transform: translateX(20px); }

  #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10,10,20,0.9); backdrop-filter: blur(4px); z-index: 50; }
  #attribution { position: absolute; top: 15px; font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: lowercase; }
  #overlayTitle { font-family: 'Teko', sans-serif; font-size: 60px; color: #ffcc33; text-transform: uppercase; line-height: 0.9; text-align: center; font-style: italic; }
  #overlayScore { display: none; color: white; margin: 15px 0; font-size: 22px; text-align: center; font-family: 'Teko', sans-serif; letter-spacing: 1px;}
  #startBtn { margin-top: 20px; padding: 12px 45px; background: #ffcc33; color: #111; border: none; border-radius: 4px; font-family: 'Teko', sans-serif; font-size: 28px; cursor: pointer; text-transform: uppercase; }
</style>
</head>
<body>
<div id="gameWrapper">
  <div id="settingsToggle">⚙️</div>
  <div id="settingsMenu">
    <div class="setting-row"><span>NIGHT MODE</span><label class="switch"><input type="checkbox" id="nightToggle"><span class="slider"></span></label></div>
    <div class="setting-row"><span>MUSIC</span><label class="switch"><input type="checkbox" id="musicToggle" checked><span class="slider"></span></label></div>
  </div>
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="scoreBox"><div id="scoreLabel">ODOMETER</div><div id="score">0</div></div>
    <div id="livesBox"><span class="life">❤️</span><span class="life">❤️</span><span class="life">❤️</span></div>
  </div>
  <div id="overlay">
    <div id="attribution">@carsonragsdale on github.com</div>
    <div id="overlayTitle">MOTORCYCLE<br>MERGE</div>
    <div id="overlayScore"></div>
    <button id="startBtn">START</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
const W = 360, H = 580; canvas.width = W; canvas.height = H;
let state = 'idle', score = 0, lives = 3, frame = 0, speed = 2.5, roadOffset = 0;
const SPEED_CAP = 8.0; 
let spawnInterval = 120;
let isNight = false, invincibility = 0;
let hiScore = localStorage.getItem('mmHiScore') || 0;

const music = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3'); music.loop = true;
const LANES = 3, ROAD_L = 40, ROAD_R = W - 40, ROAD_W = ROAD_R - ROAD_L, LANE_W = ROAD_W / LANES;
const laneX = i => ROAD_L + LANE_W * i + LANE_W / 2;
const player = { lane: 1, x: laneX(1), targetX: laneX(1), y: H - 110, w: 18, h: 36 };
let cars = [];
const CAR_COLORS = ['#e74c3c','#3498db','#2ecc71','#e67e22','#9b59b6','#f39c12'];

document.getElementById('settingsToggle').onclick = () => { const m = document.getElementById('settingsMenu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; };
document.getElementById('nightToggle').onchange = (e) => { isNight = e.target.checked; };

function updateLivesUI() { document.querySelectorAll('.life').forEach((h, i) => h.style.opacity = i < lives ? "1" : "0.1"); }

function spawnCar() {
  const lane = Math.floor(Math.random() * LANES);
  cars.push({ x: laneX(lane), y: -100, w: 38, h: 70, color: CAR_COLORS[Math.floor(Math.random() * CAR_COLORS.length)] });
}

function drawRoad() {
  ctx.fillStyle = isNight ? '#050510' : '#a8d8ea'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = isNight ? '#111' : '#c8b89a'; ctx.fillRect(0, 0, ROAD_L, H); ctx.fillRect(ROAD_R, 0, ROAD_L, H);
  ctx.fillStyle = isNight ? '#1a1a1a' : '#4a4a4a'; ctx.fillRect(ROAD_L, 0, ROAD_W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.setLineDash([30, 40]); ctx.lineDashOffset = -roadOffset; 
  for (let i = 1; i < LANES; i++) { ctx.beginPath(); ctx.moveTo(ROAD_L + i * LANE_W, 0); ctx.lineTo(ROAD_L + i * LANE_W, H); ctx.stroke(); }
  ctx.setLineDash([]);
}

function drawCar(c) {
  const x = c.x - c.w/2, y = c.y;
  ctx.fillStyle = '#666'; ctx.fillRect(x, y, c.w, 6); ctx.fillRect(x, y + c.h - 6, c.w, 6); 
  ctx.fillStyle = c.color; ctx.fillRect(x, y + 6, c.w, c.h - 12); 
  ctx.fillStyle = isNight ? '#000' : 'rgba(0,0,0,0.4)';
  ctx.fillRect(x+4, y+14, c.w-8, 14); ctx.fillRect(x+5, y+c.h-22, c.w-10, 10); 
  ctx.fillStyle = '#ffffaa'; ctx.fillRect(x+4, y+2, 8, 3); ctx.fillRect(x+c.w-12, y+2, 8, 3); 
  if (isNight) {
      ctx.shadowBlur = 10; ctx.shadowColor = '#ffffaa';
      ctx.fillRect(x+4, y+2, 8, 3); ctx.fillRect(x+c.w-12, y+2, 8, 3);
      ctx.shadowColor = '#ff4444'; ctx.fillStyle = '#ff4444'; 
      ctx.fillRect(x+4, y+c.h-4, 8, 3); ctx.fillRect(x+c.w-12, y+c.h-4, 8, 3); 
      ctx.shadowBlur = 0;
  }
}

function drawMotorcycle(p) {
  if (invincibility % 10 > 5) return;
  const x = p.x, y = p.y;
  if (isNight) {
    const grd = ctx.createLinearGradient(x, y, x, y - 120);
    grd.addColorStop(0, 'rgba(255,255,200,0.3)'); grd.addColorStop(1, 'rgba(255,255,200,0)');
    ctx.fillStyle = grd; ctx.beginPath(); ctx.moveTo(x-4, y); ctx.lineTo(x-30, y-120); ctx.lineTo(x+30, y-120); ctx.lineTo(x+4, y); ctx.fill();
  }
  ctx.fillStyle = '#111'; ctx.fillRect(x-3, y, 6, p.h); 
  ctx.fillStyle = '#e74c3c'; ctx.fillRect(x-5, y+10, 10, 15); 
  ctx.fillStyle = isNight ? '#111' : '#333'; ctx.fillRect(x-5, y+15, 10, 8); 
  ctx.fillStyle = '#000'; ctx.fillRect(x-4, y+6, 8, 8); 
}

function startGame() {
  state = 'playing'; score = 0; lives = 3; speed = 2.5; spawnInterval = 120; roadOffset = 0; cars = []; invincibility = 0;
  updateLivesUI(); document.getElementById('overlay').style.display = 'none';
  document.getElementById('settingsToggle').style.display = 'none';
  document.getElementById('settingsMenu').style.display = 'none';
  if (document.getElementById('musicToggle').checked) music.play().catch(() => {});
}

function moveL() { player.lane = Math.max(0, player.lane - 1); player.targetX = laneX(player.lane); }
function moveR() { player.lane = Math.min(2, player.lane + 1); player.targetX = laneX(player.lane); }

function loop() {
  requestAnimationFrame(loop); ctx.clearRect(0, 0, W, H); drawRoad();
  if (state === 'playing') {
    frame++; roadOffset += speed * 2; 
    if (frame % Math.round(spawnInterval) === 0) spawnCar(); 
    if (frame % 600 === 0) { 
        speed = Math.min(speed + 0.35, SPEED_CAP); 
        spawnInterval = Math.max(spawnInterval - 8, 55); 
    }
    if (invincibility > 0) invincibility--;
    cars.forEach((c) => {
      c.y += (speed - 1.2); drawCar(c);
      if (invincibility === 0 && Math.abs(player.x - c.x) < 22 && c.y + c.h > player.y && c.y < player.y + player.h) {
        lives--; updateLivesUI(); invincibility = 70;
        if (lives <= 0) {
          state = 'gameover'; music.pause();
          let fs = Math.floor(score/10);
          if (fs > hiScore) { hiScore = fs; localStorage.setItem('mmHiScore', hiScore); }
          document.getElementById('overlay').style.display = 'flex';
          document.getElementById('overlayTitle').textContent = "TOTALED!";
          document.getElementById('overlayScore').style.display = 'block';
          document.getElementById('overlayScore').innerHTML = `DISTANCE: ${fs}m<br>BEST: ${hiScore}m`;
          document.getElementById('settingsToggle').style.display = 'flex';
        }
      }
    });
    cars = cars.filter(c => c.y < H + 100);
    player.x += (player.targetX - player.x) * 0.22; drawMotorcycle(player);
    score += (speed/2); document.getElementById('score').textContent = Math.floor(score/10);
  } else { drawMotorcycle(player); }
}

// Input Handlers
document.getElementById('startBtn').onclick = (e) => { e.stopPropagation(); startGame(); };

// Touch (Mobile)
window.addEventListener('touchstart', (e) => {
  if (state !== 'playing') return;
  const touchX = e.touches[0].clientX;
  if (touchX < window.innerWidth / 2) moveL(); else moveR();
}, { passive: false });

// Keyboard (PC)
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') moveL();
  if (e.key === 'ArrowRight' || e.key === 'd') moveR();
});

loop();
</script>
</body>
</html>
